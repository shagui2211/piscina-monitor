<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piscina Exterior</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --text:#1f2a2a;
  --muted:#6b7c7a;
  --card:rgba(255,255,255,0.85);
  --border:rgba(255,255,255,0.3);
  --accent:#5f7f73;
  --mono:'DM Mono', monospace;
  --sans:'Outfit', sans-serif;
}

body{
  margin:0;
  font-family:var(--sans);
  color:var(--text);
  transition: background 2s ease;
  overflow-x:hidden;
}

/* 🌈 BACKGROUND ANIMADO */
body.sunny{background:linear-gradient(135deg,#fefcea,#f1da36);}
body.cloudy{background:linear-gradient(135deg,#d7dde8,#757f9a);}
body.rain{background:linear-gradient(135deg,#314755,#26a0da);}
body.storm{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo img{width:130px}

#clock{
  font-family:var(--mono);
  font-size:1.4rem;
}

/* GRID */
main{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

/* CARD ANIMADA */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  backdrop-filter:blur(10px);
  transform:translateY(20px);
  opacity:0;
  animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
  to{opacity:1; transform:translateY(0);}
}

.card-value{
  font-family:var(--mono);
  font-size:2.6rem;
}

.card-label{
  font-size:0.8rem;
  color:var(--muted);
}

/* 🌤️ METEO */
.meteo{
  text-align:center;
  padding:20px;
}

.meteo-icon{
  font-size:5rem;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* 🚨 ALERTAS */
#alert{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(200,50,50,0.95);
  color:white;
  padding:14px 24px;
  border-radius:12px;
  font-family:var(--mono);
  display:none;
  animation:pulse 1.5s infinite;
  z-index:999;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,0,0,0.5);}
  70%{box-shadow:0 0 0 20px rgba(255,0,0,0);}
  100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

/* FOOTER */
footer{
  text-align:center;
  font-size:0.7rem;
  color:var(--muted);
  margin-top:40px;
}
</style>
</head>

<body>

<div id="alert">⚠️ Parámetros fuera de rango</div>

<header>
  <div class="logo"><img src="assets/logo.png"></div>
  <div id="clock">--:--:--</div>
</header>

<main>

<div class="grid">

<div class="card"><div class="card-label">pH</div><div class="card-value" id="ph">—</div></div>
<div class="card"><div class="card-label">ORP</div><div class="card-value" id="orp">—</div></div>
<div class="card"><div class="card-label">Cloro</div><div class="card-value" id="ppm">—</div></div>
<div class="card"><div class="card-label">Temp agua</div><div class="card-value" id="temp">—</div></div>

</div>

<div class="card meteo">
  <div class="meteo-icon" id="icon">⛅</div>
  <div id="weather">Sin datos</div>
</div>

<footer>Valentin Hotels & Resorts</footer>

</main>

<script>
const API='https://control-piscinas.tailf7bca2.ts.net/api/piscina';

function clock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES');
}
setInterval(clock,1000);clock();

/* 🌈 BACKGROUND CLIMA */
function setBg(txt){
  txt=(txt||'').toLowerCase();

  document.body.className='';

  if(txt.includes('sol'))document.body.classList.add('sunny');
  else if(txt.includes('lluv'))document.body.classList.add('rain');
  else if(txt.includes('torment'))document.body.classList.add('storm');
  else document.body.classList.add('cloudy');
}

/* 🌤️ ICONOS MEJORADOS */
function icon(txt){
  txt=(txt||'').toLowerCase();
  if(txt.includes('sol'))return'☀️';
  if(txt.includes('lluv'))return'🌧️';
  if(txt.includes('torment'))return'⛈️';
  if(txt.includes('nube'))return'☁️';
  return'⛅';
}

/* 🚨 ALERTAS */
function checkAlert(d){
  let bad =
    d.ph<6.5 || d.ph>7.8 ||
    d.orp<600 ||
    d.ppm>2;

  document.getElementById('alert').style.display =
    bad ? 'block':'none';
}

async function load(){
let r=await fetch(API);
let d=await r.json();

document.getElementById('ph').textContent=d.ph?.toFixed(2);
document.getElementById('orp').textContent=Math.round(d.orp);
document.getElementById('ppm').textContent=d.ppm?.toFixed(2);
document.getElementById('temp').textContent=d.temp_agua?.toFixed(1);

document.getElementById('weather').textContent=d.condicion_txt;
document.getElementById('icon').textContent=icon(d.condicion_txt);

setBg(d.condicion_txt);
checkAlert(d);
}

load();
setInterval(load,15000);
</script>

</body>
</html>
