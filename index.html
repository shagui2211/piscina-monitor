<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piscina Exterior</title>
<link href="https://googleapis.com" rel="stylesheet"/>

<style>
:root{
  --bg:#f5f7f6; --surface:#ffffff; --border:#dfe5e2; --accent:#5f7f73;
  --text:#1f2a2a; --muted:#6b7c7a; --mono:'DM Mono', monospace; --sans:'Outfit', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{ background:var(--bg); color:var(--text); font-family:var(--sans); }

header{
  background:white; border-bottom:1px solid var(--border);
  padding:16px 24px; display:flex; justify-content:space-between; align-items:center;
}
.header-left{ display:flex; align-items:center; gap:16px; }
.logo{ width:140px; } .logo img{ width:100%; }

/* RELOJ */
.header-right { text-align: right; }
#reloj-grande { font-family: var(--mono); font-size: 2rem; font-weight: 500; display: block; }
#last-update { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }

main{ max-width:960px; margin:auto; padding:20px; }
.section-title{ font-size:0.7rem; color:var(--muted); margin:20px 0 10px; text-transform:uppercase; }

.grid-main{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.card{ background:white; border:1px solid var(--border); border-radius:12px; padding:16px; position:relative; }
.card-value{ font-family:var(--mono); font-size:2.2rem; }
.card-label{ font-size:0.7rem; color:var(--muted); }

.bar-wrap{ height:4px; background:var(--border); margin-top:10px; overflow:hidden; border-radius:4px; }
.bar-fill{ height:100%; background:var(--accent); transition:width .8s ease; }

.meteo-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.meteo-icon{ font-size:2rem; }

.alert{
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  background:#c94b4b; color:white; padding:10px 16px; border-radius:8px;
  font-family:var(--mono); font-size:0.8rem; display:none; z-index:999;
}

.footer{ text-align:center; margin-top:40px; font-size:0.7rem; color:var(--muted); font-family:var(--mono); }

body.tv main{ max-width:100%; padding:40px; }
body.tv .grid-main{ grid-template-columns:repeat(4,1fr); gap:30px; }
body.tv .card-value{ font-size:4rem; }
body.tv #reloj-grande { font-size: 4rem; }
</style>
</head>
<body>

<div class="alert" id="alert">⚠ Parámetros fuera de rango</div>

<header>
  <div class="header-left">
    <div class="logo"><img src="assets/logo.png"></div>
    <div>
      <div class="header-title-main">Piscina Exterior</div>
      <div class="header-title-sub">Somni Hotel & Suites</div>
    </div>
  </div>
  <div class="header-right">
    <div id="reloj-grande">00:00:00</div>
    <div id="last-update">Conectando…</div>
  </div>
</header>

<main>
<p class="section-title">Parámetros del agua</p>
<div class="grid-main">
  <div class="card">
    <div class="card-label">pH</div>
    <div class="card-value" id="val-ph">—</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar-ph"></div></div>
  </div>
  <div class="card">
    <div class="card-label">ORP</div>
    <div class="card-value" id="val-orp">—</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar-orp"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Cloro</div>
    <div class="card-value" id="val-ppm">—</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar-ppm"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Temp agua</div>
    <div class="card-value" id="val-temp">—</div>
    <div class="bar-wrap"><div class="bar-fill" id="bar-temp"></div></div>
  </div>
</div>

<p class="section-title">Ambiente</p>
<div class="grid-main">
  <div class="card"><div class="card-label">Temp exterior</div><div class="card-value" id="val-tamb">—</div></div>
  <div class="card"><div class="card-label">Humedad</div><div class="card-value" id="val-hum">—</div></div>
</div>

<p class="section-title">Meteorología</p>
<div class="meteo-grid">
  <div class="card"><div class="meteo-icon" id="meteo-icon">⛅</div><div id="val-condicion-txt">Sin datos</div></div>
  <div class="card"><div id="val-zambretti-txt">Sin datos</div></div>
</div>
<div class="footer">Valentin Hotels & Resorts</div>
</main>

<script>
const API='https://ts.net';
const R={ph:{min:6.5,max:8},orp:{min:600,max:750},ppm:{min:0,max:2.5},temp:{min:15,max:35}};

function pct(v,r){return Math.max(0,Math.min(100,(v-r.min)/(r.max-r.min)*100));}

function updateTime() {
  const ahora = new Date();
  document.getElementById('reloj-grande').textContent = ahora.toLocaleTimeString('es-ES');
}

function set(id, val, p, unit = '') {
  const el = document.getElementById('val-' + id);
  if(el) el.textContent = val + unit;
  const bar = document.getElementById('bar-' + id);
  if(bar) bar.style.width = p + '%';
}

async function load(){
  try {
    let r=await fetch(API);
    let d=await r.json();

    set('ph', d.ph?.toFixed(2), pct(d.ph, R.ph));
    set('orp', Math.round(d.orp), pct(d.orp, R.orp), ' mV');
    set('ppm', d.ppm?.toFixed(2), pct(d.ppm, R.ppm), ' ppm');
    set('temp', d.temp_agua?.toFixed(1), pct(d.temp_agua, R.temp), '°C');

    document.getElementById('val-tamb').textContent = d.temp_ambiente?.toFixed(1) + '°C';
    document.getElementById('val-hum').textContent = d.humedad?.toFixed(1) + '%';
    document.getElementById('val-condicion-txt').textContent = d.condicion_txt;
    document.getElementById('val-zambretti-txt').textContent = d.zambretti_txt;

    let bad = d.ph<6.5 || d.ph>7.8 || d.orp<600;
    document.getElementById('alert').style.display = bad?'block':'none';
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
  } catch(e) {
    document.getElementById('last-update').textContent = 'Error de conexión';
  }
}

setInterval(updateTime, 1000);
updateTime();
load();
setInterval(load, 15000);

if(location.search.includes('tv=1')){ document.body.classList.add('tv'); }
</script>
</body>
</html>
