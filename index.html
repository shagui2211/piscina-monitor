<script>
const API='https://control-piscinas.tailf7bca2.ts.net/api/piscina';

/* =========================
   UTILIDADES BÁSICAS
========================= */

function pct(v,r){
  return Math.max(0,Math.min(100,(v-r.min)/(r.max-r.min)*100));
}

const R = {
  ph:{min:6.5,max:8},
  orp:{min:600,max:750},
  ppm:{min:0,max:2.5},
  temp:{min:15,max:35}
};

function set(id,val,p){
  const v = document.getElementById('val-'+id);
  const b = document.getElementById('bar-'+id);
  if(v) v.textContent = val ?? '—';
  if(b) b.style.width = (p || 0) + '%';
}

/* =========================
   RELOJ
========================= */

function clock(){
  document.getElementById('last-update').textContent =
    new Date().toLocaleTimeString('es-ES');
}
setInterval(clock,1000);

/* =========================
   METEOROLOGÍA UNIFICADA
========================= */

function unirMeteo(condicion, zambretti){
  const c = (condicion || '').toLowerCase();
  const z = (zambretti || '').toLowerCase();

  let base = 'Tiempo estable';

  // Estado actual
  if(c.includes('despej')) base = 'Cielos despejados';
  else if(c.includes('nube')) base = 'Parcialmente nublado';
  else if(c.includes('lluv')) base = 'Lluvia';
  else if(c.includes('torment')) base = 'Tormenta';

  // Tendencia (Zambretti)
  let tendencia = '';

  if(z.includes('mejora')) tendencia = ' con tendencia a mejora';
  else if(z.includes('empeora') || z.includes('inest')) tendencia = ' con empeoramiento';
  else if(z.includes('estable')) tendencia = '';

  return base + tendencia;
}

/* =========================
   ICONO METEO
========================= */

function icono(txt){
  txt = (txt || '').toLowerCase();
  if(txt.includes('lluv')) return '🌧️';
  if(txt.includes('torment')) return '⛈️';
  if(txt.includes('despej')) return '☀️';
  if(txt.includes('nube')) return '⛅';
  return '🌤️';
}

/* =========================
   ALERTAS CRÍTICAS
========================= */

function checkAlert(d){
  const bad =
    (d.ph && (d.ph < 6.5 || d.ph > 7.8)) ||
    (d.orp && d.orp < 600) ||
    (d.ppm && d.ppm > 2.0);

  const alert = document.getElementById('alert');
  if(alert){
    alert.style.display = bad ? 'block' : 'none';
  }
}

/* =========================
   CARGA DATOS
========================= */

async function load(){
  try{
    const r = await fetch(API);
    const d = await r.json();

    // Agua
    set('ph', d.ph?.toFixed(2), pct(d.ph, R.ph));
    set('orp', Math.round(d.orp), pct(d.orp, R.orp));
    set('ppm', d.ppm?.toFixed(2), pct(d.ppm, R.ppm));
    set('temp', d.temp_agua?.toFixed(1), pct(d.temp_agua, R.temp));

    // Ambiente
    document.getElementById('val-tamb').textContent =
      d.temp_ambiente?.toFixed(1) ?? '—';

    document.getElementById('val-hum').textContent =
      d.humedad?.toFixed(1) ?? '—';

    // METEOROLOGÍA UNIFICADA (AQUÍ ESTÁ LA CLAVE)
    const meteo = unirMeteo(d.condicion_txt, d.zambretti_txt);

    const meteoTxt = document.getElementById('val-condicion-txt');
    if(meteoTxt) meteoTxt.textContent = meteo;

    const icon = document.getElementById('meteo-icon');
    if(icon) icon.textContent = icono(d.condicion_txt);

    // Alertas
    checkAlert(d);

    // Last update
    document.getElementById('last-update').textContent =
      new Date().toLocaleTimeString('es-ES');

  }catch(e){
    document.getElementById('last-update').textContent =
      'Error conexión';
  }
}

/* =========================
   INICIO
========================= */

load();
setInterval(load,15000);

/* =========================
   MODO TV
========================= */

if(location.search.includes('tv=1')){
  document.body.classList.add('tv');
}
</script>
</html>
