<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piscina Exterior</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#f5f7f6;
  --surface:#ffffff;
  --border:#dfe5e2;
  --accent:#5f7f73;
  --text:#1f2a2a;
  --muted:#6b7c7a;
  --mono:'DM Mono', monospace;
  --sans:'Outfit', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

/* HEADER */
header{
  background:white;
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo{width:140px}
.logo img{width:100%}

.header-title-main{
  font-size:1rem;
  font-weight:600;
}

.header-title-sub{
  font-size:0.7rem;
  color:var(--muted);
}

#clock{
  font-family:var(--mono);
  font-size:1.2rem;
  color:var(--accent);
}

/* LAYOUT */
main{
  max-width:960px;
  margin:auto;
  padding:20px;
}

.section-title{
  font-size:0.7rem;
  color:var(--muted);
  margin:20px 0 10px;
  text-transform:uppercase;
}

.grid-main{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* CARD */
.card{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  position:relative;
}

.card-value{
  font-family:var(--mono);
  font-size:2.2rem;
}

.card-label{
  font-size:0.7rem;
  color:var(--muted);
}

/* METEO MEJORADO */
.meteo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.meteo-card{
  text-align:center;
  padding:20px;
}

.meteo-icon{
  font-size:3rem;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:40px;
  font-size:0.7rem;
  color:var(--muted);
  font-family:var(--mono);
}

/* ===== TV MODE ===== */
body.tv header{
  position:sticky;
  top:0;
  z-index:10;
}

body.tv #clock{
  font-size:2.2rem;
}

body.tv .header-title-main{
  font-size:1.4rem;
}

body.tv .header-title-sub{
  font-size:1rem;
}

body.tv main{
  max-width:100%;
  padding:40px;
}

body.tv .grid-main{
  grid-template-columns:repeat(4,1fr);
  gap:30px;
}

body.tv .card-value{
  font-size:4rem;
}

body.tv .card-label{
  font-size:1rem;
}

body.tv .meteo-icon{
  font-size:5rem;
}

body.tv .meteo-card{
  font-size:1.4rem;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <div class="logo">
      <img src="assets/logo.png" alt="Valentin Hotels">
    </div>
    <div>
      <div class="header-title-main">Piscina Exterior</div>
      <div class="header-title-sub">Somni Hotel & Suites</div>
    </div>
  </div>

  <div id="clock">--:--:--</div>
</header>

<main>

<p class="section-title">Parámetros del agua</p>

<div class="grid-main">
  <div class="card"><div class="card-label">pH</div><div class="card-value" id="val-ph">—</div></div>
  <div class="card"><div class="card-label">ORP</div><div class="card-value" id="val-orp">—</div></div>
  <div class="card"><div class="card-label">Cloro</div><div class="card-value" id="val-ppm">—</div></div>
  <div class="card"><div class="card-label">Temp agua</div><div class="card-value" id="val-temp">—</div></div>
</div>

<p class="section-title">Ambiente</p>

<div class="grid-main">
  <div class="card"><div class="card-label">Temp exterior</div><div class="card-value" id="val-tamb">—</div></div>
  <div class="card"><div class="card-label">Humedad</div><div class="card-value" id="val-hum">—</div></div>
</div>

<p class="section-title">Meteorología</p>

<div class="meteo-grid">
  <div class="card meteo-card">
    <div class="meteo-icon" id="meteo-icon">🌤️</div>
    <div id="val-zambretti-txt">Sin datos</div>
  </div>
  <div class="card meteo-card">
    <div id="val-condicion-txt">Sin datos</div>
  </div>
</div>

<div class="footer">Valentin Hotels & Resorts</div>

</main>

<script>
const API='https://control-piscinas.tailf7bca2.ts.net/api/piscina';

function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES');
}
setInterval(updateClock,1000);
updateClock();

async function load(){
try{
let r=await fetch(API);
let d=await r.json();

document.getElementById('val-ph').textContent=d.ph?.toFixed(2);
document.getElementById('val-orp').textContent=Math.round(d.orp);
document.getElementById('val-ppm').textContent=d.ppm?.toFixed(2);
document.getElementById('val-temp').textContent=d.temp_agua?.toFixed(1);

document.getElementById('val-tamb').textContent=d.temp_ambiente?.toFixed(1);
document.getElementById('val-hum').textContent=d.humedad?.toFixed(1);

document.getElementById('val-zambretti-txt').textContent=d.zambretti_txt||'Sin datos';
document.getElementById('val-condicion-txt').textContent=d.condicion_txt||'Sin datos';

}catch(e){}
}

load();
setInterval(load,15000);

if(location.search.includes('tv=1')){
document.body.classList.add('tv');
}
</script>

</body>
</html>
